name: Run bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.12.0
      - name: Setup deps
        run: yarn
      - name: Setup creds path
        run: mkdir secrets
      - name: Setup creds
        uses: jsdaniell/create-json@1.1.2
        with:
          name: "creds.json"
          json: ${{ secrets.SHEETS_API_FILE }}
          dir: 'secrets/'
      - name: Run thing
        run: bash cron/run.sh
